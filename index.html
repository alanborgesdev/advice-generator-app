<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap" rel="stylesheet">

  <title>Advice generator app</title>
</head>
<body>
    <main class="container">
        <article class="card">
            <h1 class="advice-id">
                ADVICE #<span id="advice-id">117</span>
            </h1>

            <p class="advice-text">"It is easy to sit up and take notice, what is difficult is getting up and taking action."</p>

            <picture class="divider">
                <source media="(min-width: 768px)" srcset="./images/pattern-divider-desktop.svg">
                <img src="./images/pattern-divider-mobile.svg" alt="divider">
            </picture>

            <button class="btn-dice" id="btn-dice">
                <img src="./images/icon-dice.svg" alt="Gerar novo conselho">
            </button>
        </article>
    </main>

    <script src="./src/js/index.js"></script>
</body>
</html>
